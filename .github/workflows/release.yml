name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  release:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2

      - name: Build (arm64 + x86_64)
        run: |
          cargo build --profile dist --target aarch64-apple-darwin
          cargo build --profile dist --target x86_64-apple-darwin

      - name: Create universal binary and archive
        run: |
          lipo -create \
            target/aarch64-apple-darwin/dist/jira \
            target/x86_64-apple-darwin/dist/jira \
            -output jira
          tar -czf jira-macos.tar.gz jira

      - name: Compute checksum
        id: checksum
        run: echo "sha256=$(shasum -a 256 jira-macos.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          generateReleaseNotes: true
          artifacts: "jira-macos.tar.gz"

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/alienengineer/homebrew-jira.git
          cd homebrew-jira

          mkdir -p Formula
          URL="https://github.com/alienengineer/jira/releases/download/${VERSION}/jira-macos.tar.gz"

          cat > Formula/jira.rb << FORMULA
          class Jira < Formula
            desc "Command line application for interacting with JIRA"
            homepage "https://github.com/alienengineer/jira"
            url "${URL}"
            sha256 "${SHA256}"
            version "${VERSION}"

            def install
              bin.install "jira"
            end
          end
          FORMULA

          git config user.name "alienengineer-bot"
          git config user.email "alienengineer-bot@users.noreply.github.com"
          git add Formula/jira.rb
          git commit -m "jira ${VERSION}"
          git push
